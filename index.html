<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo EP</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="album-page">
    <section class="hero">
      <img class="cover" src="cover.jpg" alt="Album cover" />
      <div class="album-info">
        <p class="eyebrow">Demo EP</p>
        <h1>Acoustic Collection</h1>
        <p class="artist">Yae-Chan Lim</p>
        <p class="meta">5 songs</p>
        <button id="playAll" class="play-all">▶ Play All</button>
      </div>
    </section>

    <section class="track-list">
      <div class="track" data-src="songs/01-mureup.mp3">
        <div class="number">1</div>
        <div class="title">무릎</div>
        <div class="duration">--:--</div>
        <button class="play-button">▶</button>
      </div>

      <div class="track" data-src="songs/02-joahae.mp3">
        <div class="number">2</div>
        <div class="title">좋아해..</div>
        <div class="duration">--:--</div>
        <button class="play-button">▶</button>
      </div>

      <div class="track" data-src="songs/03-gobaek.mp3">
        <div class="number">3</div>
        <div class="title">고백</div>
        <div class="duration">--:--</div>
        <button class="play-button">▶</button>
      </div>

      <div class="track" data-src="songs/04-bi-junbihasini.mp3">
        <div class="number">4</div>
        <div class="title">비 준비하시니</div>
        <div class="duration">--:--</div>
        <button class="play-button">▶</button>
      </div>

      <div class="track" data-src="songs/05-perfect.mp3">
        <div class="number">5</div>
        <div class="title">Perfect</div>
        <div class="duration">--:--</div>
        <button class="play-button">▶</button>
      </div>
    </section>

    <audio id="audioPlayer" controls></audio>

    <footer>
      <p>Thank you for listening.</p>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
